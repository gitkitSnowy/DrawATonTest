<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Draw a TON | Neon Pro</title>
    
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.dot.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@400;700&display=swap');

        :root {
            --bg: #050505;
            --neon-blue: #0098ea;
            --neon-gold: #ffcc00;
            --neon-text: #fff;
            --card: rgba(18, 20, 24, 0.8);
            --border: rgba(0, 152, 234, 0.3);
        }

        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Montserrat', sans-serif; overflow: hidden;
            height: 100vh;
        }

        /* --- NEON TEXT --- */
        .neon-title {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--neon-text);
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
        }

        .neon-btn {
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            padding: 15px; border-radius: 12px; font-weight: 900;
            width: 100%; transition: 0.3s; margin-top: 10px;
        }

        .neon-btn:active { background: var(--neon-blue); color: #000; }

        /* --- LAYOUT --- */
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; padding: 20px; padding-bottom: 100px; }
        .screen.active { display: flex; }
        .glass-card { 
            background: var(--card); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 20px;
            padding: 20px; margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* --- NAVIGATION --- */
        .nav {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(0,0,0,0.9); display: flex; 
            justify-content: space-around; align-items: center;
            border-top: 1px solid var(--border); z-index: 1000;
        }
        .nav-item { color: #555; background: none; border: none; font-family: 'Orbitron'; font-size: 10px; }
        .nav-item.active { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        /* --- DRAW ENGINE --- */
        #paint-overlay { 
            position: fixed; inset: 0; background: #fff; z-index: 2000; 
            display: none; flex-direction: column; 
        }
        canvas { touch-action: none; flex-grow: 1; background: #fff; }

        /* --- ADMIN SPECIFIC --- */
        .admin-scroll { overflow-y: auto; flex-grow: 1; }
        .user-row { 
            display: flex; justify-content: space-between; 
            padding: 10px; border-bottom: 1px solid var(--border); 
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="scr-lobby" class="screen active">
        <div style="text-align: center; margin-top: 40px;">
            <h1 class="neon-title" style="font-size: 32px;">Draw a <span style="color:var(--neon-gold); text-shadow: 0 0 10px var(--neon-gold);">TON</span></h1>
            <p style="font-size: 12px; opacity: 0.7;">ENTER THE CYBER ARENA</p>
        </div>

        <div class="glass-card" style="margin-top: 30px; text-align: center;">
            <div id="wallet-status" style="color: var(--neon-gold); margin-bottom: 10px; font-weight: bold;">КОШЕЛЕК НЕ ПОДКЛЮЧЕН</div>
            <button class="neon-btn" onclick="Wallet.connect()" id="btn-connect">ПОДКЛЮЧИТЬ КОШЕЛЕК</button>
        </div>

        <div class="glass-card">
            <div style="display: flex; justify-content: space-between;">
                <span>ВАШ БАЛАНС:</span>
                <b style="color: var(--neon-blue);" id="val-bal">0.00 TON</b>
            </div>
            <button class="neon-btn" style="border-color: var(--neon-gold); color: var(--neon-gold); box-shadow: 0 0 10px var(--neon-gold);" onclick="Game.join()">УЧАСТВОВАТЬ (0.1 TON)</button>
        </div>
    </div>

    <div id="scr-admin" class="screen">
        <h2 class="neon-title">Админ-Панель</h2>
        <div class="admin-scroll">
            <div class="glass-card">
                <input type="text" id="adm-task" placeholder="Предмет для рисования" style="width:100%; padding:10px; background:#000; border:1px solid var(--neon-blue); color:#fff; border-radius:8px;">
                <button class="neon-btn" onclick="Admin.startRound()">ЗАПУСТИТЬ БИТВУ</button>
            </div>
            <div id="users-list" class="glass-card">
                </div>
        </div>
    </div>

    <div id="paint-overlay">
        <div style="background:#000; color:#fff; padding: 40px 20px 20px; display:flex; justify-content:space-between;">
            <b id="timer" style="color:var(--neon-blue)">06:00</b>
            <b id="task">РИСУЙ ТОН</b>
            <button onclick="Game.submit()" style="background:var(--neon-blue); border:none; color:#000; font-weight:900; padding:5px 15px; border-radius:8px;">ОТПРАВИТЬ</button>
        </div>
        <canvas id="c"></canvas>
    </div>

    <nav class="nav">
        <button class="nav-item active" onclick="UI.nav('lobby', this)">БИТВА</button>
        <button class="nav-item" onclick="UI.nav('admin', this)" id="nav-adm" style="display:none;">АДМИН</button>
    </nav>

    <script>
        // --- DATA ---
        const firebaseConfig = {
            apiKey: "AIzaSyBawoHndJxGvNGbGxq5RnuCIA2doGKSQOM",
            authDomain: "paint-tg.firebaseapp.com",
            databaseURL: "https://paint-tg-default-rtdb.firebaseio.com",
            projectId: "paint-tg",
            databaseURL: "https://paint-tg-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user || { id: 1, first_name: "Boss", username: "Kegovich" };

        // --- WALLET (TONCONNECT) ---
        const connector = new TonConnectSDK.TonConnect();
        
        const Wallet = {
            async connect() {
                const walletConnectionSource = {
                    universalLink: 'https://tonkeeper.com/ton-connect',
                    bridgeUrl: 'https://bridge.tonapi.io/bridge'
                };
                const url = connector.connect(walletConnectionSource);
                tg.openLink(url);
            }
        };

        connector.onStatusChange(w => {
            if (w) {
                document.getElementById('wallet-status').innerText = "ПОДКЛЮЧЕНО: " + w.account.address.slice(0,6) + "...";
                db.ref('users/' + user.id + '/address').set(w.account.address);
            }
        });

        // --- GAME LOGIC ---
        const Game = {
            init() {
                if(user.username === 'Kegovich') {
                    document.getElementById('nav-adm').style.display = 'block';
                    Admin.listen();
                }
                this.sync();
                this.listenState();
            },
            sync() {
                db.ref('users/' + user.id).on('value', s => {
                    const data = s.val() || { name: user.first_name, balance: 0.0 };
                    document.getElementById('val-bal').innerText = (data.balance || 0).toFixed(2) + " TON";
                });
            },
            listenState() {
                db.ref('game_state').on('value', s => {
                    const st = s.val();
                    if(st && st.status === 'drawing') {
                        document.getElementById('paint-overlay').style.display = 'flex';
                        Engine.init();
                    } else {
                        document.getElementById('paint-overlay').style.display = 'none';
                    }
                });
            },
            join() {
                // В реальности тут вызывается транзакция через connector.sendTransaction
                alert("Транзакция отправлена в кошелек...");
            }
        };

        const Admin = {
            startRound() {
                const t = document.getElementById('adm-task').value;
                db.ref('game_state').set({ status: 'drawing', subject: t, endTime: Date.now() + 360000 });
            },
            listen() {
                db.ref('users').on('value', s => {
                    const list = document.getElementById('users-list');
                    list.innerHTML = "<h4>ИГРОКИ:</h4>";
                    s.forEach(u => {
                        const d = u.val();
                        list.innerHTML += `<div class="user-row"><span>${d.name}</span><b>${(d.balance||0).toFixed(2)} TON</b></div>`;
                    });
                });
            }
        };

        const UI = {
            nav(id, el) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('scr-' + id).classList.add('active');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                el.classList.add('active');
            }
        };

        const Engine = {
            init() {
                const canvas = document.getElementById('c');
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight - 150;
                ctx.strokeStyle = "#000"; ctx.lineWidth = 5;
                
                let draw = false;
                canvas.ontouchstart = (e) => { draw = true; ctx.beginPath(); };
                canvas.ontouchmove = (e) => {
                    if(!draw) return;
                    const t = e.touches[0];
                    ctx.lineTo(t.clientX, t.clientY - 100);
                    ctx.stroke();
                };
                canvas.ontouchend = () => draw = false;
            }
        };

        Game.init();
    </script>
</body>
</html>
