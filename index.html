<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>⚔️ Draw a TON | Pro Arena</title>
  
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Inter:wght@300;400;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      user-select: none;
    }

    :root {
      --bg: #03050a;
      --surface: #0d1117;
      --border: rgba(255,255,255,0.08);
      --accent: #00c2ff;
      --accent-glow: rgba(0,194,255,0.6);
      --gold: #fbbf24;
      --danger: #ef4444;
      --success: #10b981;
      --text: #ffffff;
      --text-dim: #9ca3af;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
      font-family: 'Inter', sans-serif;
    }

    body, html {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      touch-action: manipulation;
    }

    ::-webkit-scrollbar { width: 0; background: transparent; }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      background: var(--bg);
      padding-bottom: calc(80px + var(--safe-bottom));
    }
    .screen.active { display: flex; animation: slideIn 0.25s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .glass {
      background: rgba(18, 22, 28, 0.7);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 28px;
    }

    .header {
      padding: calc(var(--safe-top) + 16px) 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .user-pill {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      padding: 6px 18px 6px 6px;
      border-radius: 40px;
      border: 1px solid var(--border);
    }
    .user-pill img {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid var(--accent);
    }
    .balance-badge {
      background: linear-gradient(135deg, #0055ff, var(--accent));
      padding: 10px 22px;
      border-radius: 32px;
      box-shadow: 0 0 18px var(--accent-glow);
    }

    .tab-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: calc(78px + var(--safe-bottom));
      background: rgba(3,5,10,0.95);
      backdrop-filter: blur(30px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: var(--safe-bottom);
      z-index: 1000;
    }
    .tab-item {
      background: none;
      border: none;
      color: var(--text-dim);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      padding: 8px 12px;
      transition: 0.2s;
    }
    .tab-item.active { color: var(--accent); transform: translateY(-3px); }
    .tab-item svg { width: 24px; height: 24px; fill: currentColor; }

    .btn-action {
      background: var(--accent);
      color: #000;
      border: none;
      width: 100%;
      padding: 18px;
      border-radius: 24px;
      font-weight: 800;
      font-size: 17px;
      letter-spacing: 0.5px;
      font-family: 'Orbitron', sans-serif;
      box-shadow: 0 8px 28px var(--accent-glow);
      transition: all 0.2s;
      margin: 10px 0;
      text-transform: uppercase;
    }
    .btn-action:active { transform: scale(0.96); opacity: 0.9; }

    #draw-overlay {
      position: fixed;
      inset: 0;
      background: #ffffff;
      z-index: 5000;
      display: none;
      flex-direction: column;
      touch-action: none;
    }
    .draw-header {
      background: #000;
      color: white;
      padding: calc(var(--safe-top) + 12px) 20px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #main-canvas {
      flex: 1;
      width: 100%;
      background: white;
      touch-action: none;
      cursor: crosshair;
    }
    .draw-tools {
      background: #0f0f0f;
      padding: 14px 20px calc(18px + var(--safe-bottom));
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .color-palette {
      display: flex;
      gap: 12px;
      overflow-x: auto;
    }
    .color-swatch {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.15);
      flex-shrink: 0;
    }
    .color-swatch.active { border-color: var(--accent); transform: scale(1.15); box-shadow: 0 0 10px var(--accent); }

    .admin-panel {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 24px;
      padding: 16px;
      margin: 12px 0;
    }
    .chat-box {
      background: #0a0a0a;
      border-radius: 20px;
      padding: 14px;
      height: 280px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border: 1px solid #222;
    }
    .msg {
      background: #1a1f2b;
      padding: 10px 14px;
      border-radius: 18px;
      max-width: 85%;
      font-size: 14px;
    }
    .msg strong { color: var(--accent); }
  </style>
</head>
<body>

  <svg style="display:none">
    <symbol id="icon-battle" viewBox="0 0 24 24"><path d="M21 13v10h-6v-6h-6v6h-6v-10l9-7 9 7zm-9-11l-12 9h3v10h5v-6h6v6h5v-10h3l-10-9z"/></symbol>
    <symbol id="icon-top" viewBox="0 0 24 24"><path d="M6 20h3v-10h-3v10zm6 0h3v-14h-3v14zm6 0h3v-7h-3v7zm-12 2h18v-2h-18v2z"/></symbol>
    <symbol id="icon-admin" viewBox="0 0 24 24"><path d="M12 1l-10 4.43v6.13c0 6.17 4.26 11.95 10 13.44 5.74-1.49 10-7.27 10-13.44v-6.13l-10-4.43z"/></symbol>
    <symbol id="icon-brush" viewBox="0 0 24 24"><path d="M7 14c-1.1 0-2 .9-2 2 0 .34.08.66.23.94l-2.23 2.23c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l2.23-2.23c.28.15.6.23.94.23 1.1 0 2-.9 2-2s-.9-2-2-2zm14.56-11.31c-1.52-1.52-3.98-1.52-5.5 0l-10.74 10.74c-.39.39-.39 1.02 0 1.41l4.09 4.09c.39.39 1.02.39 1.41 0l10.74-10.74c1.52-1.52 1.52-3.98 0-5.5z"/></symbol>
    <symbol id="icon-undo" viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6l-3.6-3.6v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></symbol>
  </svg>

  <header class="header">
    <div class="user-pill">
      <img id="head-avatar" src="https://api.dicebear.com/7.x/pixel-art/svg?seed=user" alt="ava">
      <span id="head-name" style="font-weight:700;">Player</span>
    </div>
    <div class="balance-badge">
      <span style="font-size:10px;opacity:0.8;">BALANCE</span>
      <span id="head-balance" style="font-weight:900;font-family:'Orbitron';">0.00 TON</span>
    </div>
  </header>

  <!-- BATTLE SCREEN -->
  <div id="scr-battle" class="screen active">
    <div class="content" style="padding:10px 20px;overflow-y:auto;">
      <div class="glass" style="padding:24px;text-align:center;margin-top:10px;">
        <h1 style="font-family:'Orbitron';font-size:34px;">Draw a <span style="color:var(--accent);">TON</span></h1>
        <p style="color:var(--text-dim);">Битва художников · 15 мест</p>
        <div style="background:#000;border-radius:20px;padding:18px;margin:18px 0;">
          <div id="game-status" style="font-family:'Orbitron';font-size:22px;">ОЖИДАНИЕ</div>
          <div id="game-subject-preview" style="color:var(--accent);">Тема не задана</div>
          <div id="lobby-count" style="font-size:14px;">0/15 игроков</div>
        </div>
        <button class="btn-action" id="join-btn" onclick="App.joinBattle()">⚡ ВСТУПИТЬ (0.1 TON)</button>
        <div id="ton-connect-btn" style="margin-top:12px;"></div>
      </div>
      <div id="active-drawing-notice" style="display:none;margin-top:14px;background:var(--accent);padding:12px;border-radius:12px;color:#000;text-align:center;font-weight:bold;">
        Идёт рисование! Вы не в этом раунде.
      </div>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div id="scr-top" class="screen">
    <div class="content" style="padding:20px;">
      <h2 style="font-family:'Orbitron';">🏆 TOP LEGENDS</h2>
      <div id="leaderboard" style="margin-top:20px;"></div>
    </div>
  </div>

  <!-- ADMIN SCREEN (расширенный) -->
  <div id="scr-admin" class="screen">
    <div class="content" style="padding:20px;overflow-y:auto;">
      <h2 style="color:var(--danger);font-family:'Orbitron';">🛡️ COMMAND CENTER</h2>
      
      <div class="admin-panel">
        <h3>🎮 Управление раундом</h3>
        <input type="text" id="adm-subject" placeholder="Тема рисунка" style="width:100%;padding:14px;background:#000;border:1px solid #444;color:#fff;border-radius:14px;margin:10px 0;">
        <div style="display:flex;gap:10px;">
          <button class="btn-action" style="background:#10b981;" onclick="Admin.forceStartRound()">СТАРТ</button>
          <button class="btn-action" style="background:#444;" onclick="Admin.resetToLobby()">СБРОС</button>
        </div>
      </div>

      <div class="admin-panel" style="border-color:var(--accent);">
        <h3>💰 Баланс игрока</h3>
        <input type="text" id="adm-uid" placeholder="User ID" style="width:100%;padding:12px;background:#000;border:1px solid #444;color:#fff;border-radius:12px;margin:8px 0;">
        <input type="number" id="adm-amount" placeholder="Сумма TON" step="0.01" style="width:100%;padding:12px;background:#000;border:1px solid #444;color:#fff;border-radius:12px;margin-bottom:8px;">
        <div style="display:flex;gap:10px;">
          <button onclick="Admin.modifyBalance('add')" style="flex:1;background:#10b981;border:none;padding:12px;border-radius:14px;font-weight:bold;">+ ДОБАВИТЬ</button>
          <button onclick="Admin.modifyBalance('deduct')" style="flex:1;background:#ef4444;border:none;padding:12px;border-radius:14px;">- СНЯТЬ</button>
        </div>
      </div>

      <div class="admin-panel" style="border-color:#fbbf24;">
        <h3>📋 Логи пополнений (последние 10)</h3>
        <div id="log-container" style="max-height:140px;overflow-y:auto;font-size:13px;background:#000;padding:10px;border-radius:12px;"></div>
      </div>

      <div class="admin-panel">
        <h3>💬 Общий чат (маты фильтруются)</h3>
        <div id="chat-messages" class="chat-box"></div>
        <div style="display:flex;gap:8px;margin-top:10px;">
          <input type="text" id="chat-input" placeholder="Сообщение..." style="flex:1;padding:12px;background:#000;border:1px solid #444;color:#fff;border-radius:14px;">
          <button onclick="Admin.sendChat()" style="background:var(--accent);border:none;padding:0 22px;border-radius:14px;font-weight:bold;">📨</button>
        </div>
      </div>
    </div>
  </div>

  <!-- DRAW OVERLAY -->
  <div id="draw-overlay">
    <div class="draw-header">
      <span id="draw-timer" style="font-family:'Orbitron';">06:00</span>
      <span id="draw-task" style="font-weight:900;">ЗАГРУЗКА</span>
      <button onclick="Engine.submitDrawing()" style="background:var(--accent);color:#000;border:none;padding:10px 24px;border-radius:14px;font-weight:900;">ОТПРАВИТЬ</button>
    </div>
    <canvas id="main-canvas"></canvas>
    <div class="draw-tools">
      <div class="color-palette" id="palette"></div>
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="brush-btn" id="tool-brush" onclick="Engine.setTool('brush')"><svg width="24" height="24"><use href="#icon-brush"/></svg></button>
        <button class="brush-btn" id="tool-fill" onclick="Engine.setTool('fill')">🪣</button>
        <button class="brush-btn" onclick="Engine.undo()"><svg width="24" height="24"><use href="#icon-undo"/></svg></button>
        <input type="range" id="brush-size" min="2" max="40" value="6" style="flex:1;accent-color:var(--accent);">
      </div>
    </div>
  </div>

  <nav class="tab-bar">
    <button class="tab-item active" onclick="UI.switchTab('battle',this)"><svg><use href="#icon-battle"/></svg>Battle</button>
    <button class="tab-item" onclick="UI.switchTab('top',this)"><svg><use href="#icon-top"/></svg>Legends</button>
    <button class="tab-item" id="tab-admin" style="display:none;" onclick="UI.switchTab('admin',this)"><svg><use href="#icon-admin"/></svg>Admin</button>
  </nav>

  <script>
    // ---------- FIREBASE ----------
    const firebaseConfig = {
      apiKey: "AIzaSyBawoHndJxGvNGbGxq5RnuCIA2doGKSQOM",
      authDomain: "paint-tg.firebaseapp.com",
      databaseURL: "https://paint-tg-default-rtdb.firebaseio.com",
      projectId: "paint-tg",
      storageBucket: "paint-tg.firebasestorage.app",
      messagingSenderId: "1072051223023",
      appId: "1:1072051223023:web:946b3082fe853666581e1a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ---------- TELEGRAM ----------
    const tg = window.Telegram.WebApp;
    tg.expand();
    const rawUser = tg.initDataUnsafe?.user || { id: 123456, first_name: "Artist", username: "creator" };
    const userId = rawUser.id.toString();
    const isAdmin = (rawUser.username || '').toLowerCase() === 'kegovich';

    // ---------- TON CONNECT ----------
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
      manifestUrl: 'https://kegovich.github.io/draw-a-ton/tonconnect-manifest.json',
      buttonRootId: 'ton-connect-btn'
    });

    // ---------- ГЛОБАЛЬНОЕ СОСТОЯНИЕ ----------
    const App = {
      user: null,
      init() {
        if(isAdmin) document.getElementById('tab-admin').style.display = 'flex';
        this.syncUser();
        this.listenGameState();
        this.listenLobby();
        Admin.listenLogs();
        Admin.listenChat();
      },
      syncUser() {
        db.ref(`users/${userId}`).on('value', snap => {
          let data = snap.val();
          if (!data) {
            data = { name: rawUser.first_name, balance: 0.5, wins: 0, avatar: `https://api.dicebear.com/7.x/pixel-art/svg?seed=${userId}` };
            db.ref(`users/${userId}`).set(data);
          }
          this.user = data;
          document.getElementById('head-name').innerText = data.name;
          document.getElementById('head-balance').innerText = data.balance.toFixed(2) + ' TON';
          document.getElementById('head-avatar').src = data.avatar;
        });
      },
      listenGameState() {
        db.ref('game_state').on('value', snap => {
          const state = snap.val() || { status: 'lobby' };
          const statusEl = document.getElementById('game-status');
          const subjectEl = document.getElementById('game-subject-preview');
          if (state.status === 'lobby') {
            statusEl.innerText = 'ОЖИДАНИЕ ИГРОКОВ';
            subjectEl.innerText = state.subject || 'Тема не назначена';
            UI.closeDrawOverlay();
          } else if (state.status === 'drawing') {
            statusEl.innerText = '🎨 ИДЁТ БИТВА!';
            subjectEl.innerText = state.subject;
            const myParticipation = state.players && state.players[userId];
            if (myParticipation) {
              UI.openDrawOverlay(state.subject, state.endTime);
            } else {
              document.getElementById('active-drawing-notice').style.display = 'block';
            }
          } else if (state.status === 'voting') {
            statusEl.innerText = '📊 ГОЛОСОВАНИЕ';
          }
        });
      },
      listenLobby() {
        db.ref('lobby_players').on('value', snap => {
          const players = snap.val() || {};
          const count = Object.keys(players).length;
          document.getElementById('lobby-count').innerText = `${count}/15`;
        });
      },
      async joinBattle() {
        if (!this.user || this.user.balance < 0.1) return alert('Недостаточно TON');
        const gameSnap = await db.ref('game_state').once('value');
        const game = gameSnap.val() || {};
        if (game.status !== 'lobby') return alert('Раунд уже идёт!');
        // Имитация списания
        await db.ref(`users/${userId}/balance`).transaction(b => (b || 0) - 0.1);
        await db.ref(`lobby_players/${userId}`).set({ name: this.user.name, avatar: this.user.avatar });
        tg.HapticFeedback.notificationOccurred('success');
      }
    };

    // ---------- UI MANAGER ----------
    const UI = {
      switchTab(tab, btn) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById(`scr-${tab}`).classList.add('active');
        if(btn) btn.classList.add('active');
      },
      openDrawOverlay(subject, endTime) {
        const overlay = document.getElementById('draw-overlay');
        overlay.style.display = 'flex';
        document.getElementById('draw-task').innerText = subject;
        Engine.initCanvas();
        this.timerInterval = setInterval(() => {
          const diff = endTime - Date.now();
          const el = document.getElementById('draw-timer');
          if (diff <= 0) {
            clearInterval(this.timerInterval);
            el.innerText = '00:00';
            Engine.submitDrawing();
          } else {
            const m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
            el.innerText = `${m}:${s < 10 ? '0'+s : s}`;
          }
        }, 500);
      },
      closeDrawOverlay() {
        document.getElementById('draw-overlay').style.display = 'none';
        if (this.timerInterval) clearInterval(this.timerInterval);
      }
    };

    // ---------- DRAWING ENGINE (исправлено касание) ----------
    const Engine = {
      canvas: null, ctx: null,
      drawing: false,
      lastX: 0, lastY: 0,
      color: '#000000', size: 6, tool: 'brush',
      history: [],
      initCanvas() {
        this.canvas = document.getElementById('main-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight - 180;
        this.ctx.fillStyle = '#ffffff';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        this.ctx.lineCap = 'round';
        this.ctx.lineJoin = 'round';
        this.setupPalette();
        this.bindEvents();
        document.getElementById('brush-size').value = this.size;
        document.getElementById('brush-size').oninput = (e) => this.size = parseInt(e.target.value);
      },
      setupPalette() {
        const colors = ['#000000','#FFFFFF','#EF4444','#10B981','#3B82F6','#FBBF24','#A855F7','#F97316'];
        const container = document.getElementById('palette');
        container.innerHTML = '';
        colors.forEach(c => {
          const div = document.createElement('div');
          div.className = 'color-swatch' + (c === this.color ? ' active' : '');
          div.style.background = c;
          div.onclick = () => {
            this.color = c;
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
            div.classList.add('active');
          };
          container.appendChild(div);
        });
      },
      bindEvents() {
        this.canvas.addEventListener('touchstart', (e) => {
          e.preventDefault();
          const rect = this.canvas.getBoundingClientRect();
          const touch = e.touches[0];
          this.lastX = touch.clientX - rect.left;
          this.lastY = touch.clientY - rect.top;
          this.drawing = true;
          if (this.tool === 'fill') {
            this.floodFill(Math.floor(this.lastX), Math.floor(this.lastY));
            this.drawing = false;
          } else {
            this.saveState();
            this.ctx.beginPath();
            this.ctx.moveTo(this.lastX, this.lastY);
          }
        });
        this.canvas.addEventListener('touchmove', (e) => {
          e.preventDefault();
          if (!this.drawing || this.tool === 'fill') return;
          const rect = this.canvas.getBoundingClientRect();
          const touch = e.touches[0];
          const x = touch.clientX - rect.left;
          const y = touch.clientY - rect.top;
          this.ctx.lineTo(x, y);
          this.ctx.strokeStyle = this.color;
          this.ctx.lineWidth = this.size;
          this.ctx.stroke();
          this.ctx.beginPath();
          this.ctx.moveTo(x, y);
          this.lastX = x; this.lastY = y;
        });
        window.addEventListener('touchend', () => { this.drawing = false; });
      },
      setTool(t) {
        this.tool = t;
        document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById(`tool-${t}`);
        if(btn) btn.classList.add('active');
      },
      saveState() {
        if (this.history.length > 15) this.history.shift();
        this.history.push(this.canvas.toDataURL());
      },
      undo() {
        if (this.history.length === 0) return;
        const last = this.history.pop();
        const img = new Image();
        img.src = last;
        img.onload = () => {
          this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
          this.ctx.drawImage(img,0,0);
        };
      },
      floodFill(x,y) {
        const imageData = this.ctx.getImageData(0,0,this.canvas.width,this.canvas.height);
        const target = this.getPixel(imageData,x,y);
        const fill = this.hexToRgb(this.color);
        if (this.colorsMatch(target,fill)) return;
        const stack = [[x,y]];
        while(stack.length) {
          const [cx,cy] = stack.pop();
          const current = this.getPixel(imageData,cx,cy);
          if(this.colorsMatch(current,target)) {
            this.setPixel(imageData,cx,cy,fill);
            stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
          }
        }
        this.ctx.putImageData(imageData,0,0);
      },
      getPixel(img,x,y) { const i=(y*img.width+x)*4; return [img.data[i],img.data[i+1],img.data[i+2]]; },
      setPixel(img,x,y,c) { const i=(y*img.width+x)*4; img.data[i]=c[0]; img.data[i+1]=c[1]; img.data[i+2]=c[2]; img.data[i+3]=255; },
      colorsMatch(a,b) { return a[0]===b[0]&&a[1]===b[1]&&a[2]===b[2]; },
      hexToRgb(h) { return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; },
      submitDrawing() {
        const dataUrl = this.canvas.toDataURL('image/webp',0.7);
        db.ref(`submissions/${userId}`).set({
          img: dataUrl,
          user: App.user?.name || rawUser.first_name,
          votes: 0
        });
        UI.closeDrawOverlay();
      }
    };

    // ---------- ADMIN MODULE (расширен) ----------
    const Admin = {
      forceStartRound() {
        const subject = document.getElementById('adm-subject').value || 'КОСМОС';
        db.ref('lobby_players').once('value').then(snap => {
          const players = snap.val() || {};
          db.ref('game_state').set({
            status: 'drawing',
            subject: subject,
            endTime: Date.now() + 360000,
            players: players
          });
        });
      },
      resetToLobby() {
        db.ref('game_state').set({ status: 'lobby' });
        db.ref('lobby_players').remove();
        db.ref('submissions').remove();
      },
      modifyBalance(action) {
        const uid = document.getElementById('adm-uid').value.trim();
        const amt = parseFloat(document.getElementById('adm-amount').value);
        if (!uid || isNaN(amt)) return alert('Введите ID и сумму');
        const delta = action === 'add' ? amt : -amt;
        db.ref(`users/${uid}/balance`).transaction(b => (b||0) + delta);
        db.ref(`logs/transactions`).push({
          user: uid, amount: delta, type: action, timestamp: Date.now(), admin: userId
        });
      },
      listenLogs() {
        db.ref('logs/transactions').limitToLast(10).on('value', snap => {
          const logs = snap.val();
          const container = document.getElementById('log-container');
          if (!logs) { container.innerHTML = 'Нет логов'; return; }
          container.innerHTML = Object.entries(logs).reverse().map(([k,v])=> 
            `<div style="margin:4px 0;">${v.type==='add'?'➕':'➖'} ${v.user}: ${v.amount} TON</div>`
          ).join('');
        });
      },
      sendChat() {
        const input = document.getElementById('chat-input');
        let msg = input.value.trim();
        if (!msg) return;
        msg = this.censor(msg);
        db.ref('chat/messages').push({
          user: App.user?.name || 'Admin',
          text: msg,
          time: Date.now()
        });
        input.value = '';
      },
      listenChat() {
        db.ref('chat/messages').limitToLast(40).on('value', snap => {
          const msgs = snap.val();
          const box = document.getElementById('chat-messages');
          if (!msgs) { box.innerHTML = '<div style="color:gray;">Чат пуст</div>'; return; }
          box.innerHTML = Object.values(msgs).map(m => 
            `<div class="msg"><strong>${m.user}:</strong> ${m.text}</div>`
          ).join('');
          box.scrollTop = box.scrollHeight;
        });
      },
      censor(text) {
        const bad = ['бля','сука','хуй','пизд','ебат','нах','жоп'];
        let res = text;
        bad.forEach(w => {
          const regex = new RegExp(w, 'gi');
          res = res.replace(regex, match => '*'.repeat(match.length));
        });
        return res;
      }
    };

    // Запуск
    App.init();
  </script>
